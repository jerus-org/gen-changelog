version: 2.1

parameters:
  gen_changelog_version:
    type: string
    default: ""
    description: "Version override for gen-changelog crate (empty = auto-detect)"
  workspace_version:
    type: string
    default: ""
    description: "Version override for workspace release (empty = auto-detect via nextsv)"

orbs:
  toolkit: jerus-org/circleci-toolkit@4.7.1

jobs:
  tools:
    executor:
      name: toolkit/rust_env_rolling
    steps:
      - run:
          name: Verify tools
          command: |
            set -ex
            nextsv --version
            pcu --version
            cargo release --version
            jq --version
            rsign --version

workflows:
  release:
    jobs:
      - tools

      # Calculate versions BEFORE the approval gate so the reviewer knows
      # exactly what will be released. The approved versions are persisted to
      # the workspace and used unchanged by the release jobs after approval.
      - toolkit/calculate_versions:
          name: calculate-versions
          requires: [tools]
          crates: "gen-changelog:gen-changelog-v"
          crate_version_overrides: "gen-changelog:<< pipeline.parameters.gen_changelog_version >>"
          workspace_version_override: << pipeline.parameters.workspace_version >>

      - approve-release:
          type: approval
          requires: [calculate-versions]

      - toolkit/release_crate:
          name: release-gen-changelog
          requires: [approve-release]
          package: gen-changelog
          crate_tag_prefix: gen-changelog-v
          build_binary: true
          binary_name: gen-changelog
          context:
            - release
            - bot-check
            - pcu-app

      # Release workspace (v* tag) and update PRLOG after crate release.
      # Crate release only creates gen-changelog-v* tags; workspace release
      # is independent and tracks all changes via v* tags.
      - toolkit/release_prlog:
          requires: [release-gen-changelog]
          context:
            - release
            - bot-check
            - pcu-app
