version: 2.1

parameters:
  min-rust-version:
    type: string
    default: "1.87"

orbs:
  toolkit: jerus-org/circleci-toolkit@6.0.0

workflows:
  validation:
    jobs:
      # Signature verification for trusted PRs (with write access for comments)
      - toolkit/verify_commit_signatures:
          name: verify_commit_signatures_trusted
          context: bot-check
          post_comment: true
          update_pcu: false
          filters:
            branches:
              ignore:
                - main
                - /pull\/[0-9]+/
      # Signature verification for forked PRs (read-only, no comments)
      - toolkit/verify_commit_signatures:
          name: verify_commit_signatures_forked
          post_comment: false
          update_pcu: false
          filters:
            branches:
              only: /pull\/[0-9]+/
      - toolkit/required_builds:
          min_rust_version: << pipeline.parameters.min-rust-version >>
      - toolkit/optional_builds:
          filters:
            branches:
              ignore:
                - main
      - toolkit/test_doc_build:
          filters:
            branches:
              ignore:
                - main
      - toolkit/common_tests:
          min_rust_version: << pipeline.parameters.min-rust-version >>
          test_runner: nextest
      - toolkit/idiomatic_rust:
          filters:
            branches:
              ignore:
                - main
      # security audit only: runs on forked PRs (no secrets exposure) and main
      - toolkit/security:
          name: security audit only
          sonarcloud: false
          filters:
            branches:
              only:
                - main
                - /pull\/[0-9]+/
      # security with sonarcloud: runs on trusted feature branches only
      - toolkit/security:
          name: security with sonarcloud
          context: SonarCloud
          filters:
            branches:
              ignore:
                - /pull\/[0-9]+/
                - main

